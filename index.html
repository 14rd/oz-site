<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OZ</title>
<style>
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro'), local('NeueHaasDisplay-Roman'), local('Helvetica Neue');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro Medium'), local('NeueHaasDisplay-Medium'), local('Helvetica Neue Medium');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro Bold'), local('NeueHaasDisplay-Bold'), local('Helvetica Neue Bold');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasText';
  src: local('Neue Haas Grotesk Text Pro'), local('NeueHaasText-Roman'), local('Helvetica Neue');
  font-weight: 400;
  font-style: normal;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'NeueHaasDisplay', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #000;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  min-height: 100dvh;
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  padding: calc(14px + var(--sat)) 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  pointer-events: none;
}

.header > * { pointer-events: auto; }

.header-logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.04em;
  flex-shrink: 0;
}

.search-bar {
  flex: 1;
  max-width: 280px;
  height: 38px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s;
  background: rgba(0,0,0,0.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  backdrop-filter: blur(24px) saturate(1.3);
}

.search-bar:hover { border-color: rgba(255,255,255,0.4); }

.search-bar svg {
  width: 15px;
  height: 15px;
  stroke: rgba(255,255,255,0.45);
}

.profile-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
  cursor: pointer;
  transition: border-color 0.2s;
  background: rgba(0,0,0,0.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  backdrop-filter: blur(24px) saturate(1.3);
}

.profile-btn:hover { border-color: rgba(255,255,255,0.4); }

/* ===== SECTION 1: HERO ===== */
.hero {
  position: relative;
  height: 200dvh;
}

.hero-sticky {
  position: sticky;
  top: 0;
  height: 100dvh;
  overflow: hidden;
}

.wheel-container {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wheel {
  position: relative;
  width: 340px;
  height: 340px;
  touch-action: none;
}

.wheel-item {
  position: absolute;
  border-radius: 50%;
  overflow: hidden;
  will-change: transform;
  cursor: pointer;
  background-size: cover;
  background-position: center;
}

/* Glass: semi-transparent with blur — NOT opaque */
.glass-panel {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 50%;
  background: rgba(0,0,0,0.65);
  -webkit-backdrop-filter: blur(48px) saturate(1.2);
  backdrop-filter: blur(48px) saturate(1.2);
  z-index: 10;
}

.glass-content {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 11;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 28px 40px;
  height: 50%;
}

.glass-welcome {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.6);
  margin-bottom: 14px;
  letter-spacing: 0.02em;
}

.glass-headline {
  font-size: 34px;
  font-weight: 500;
  line-height: 1.08;
  letter-spacing: -0.025em;
  margin-bottom: 12px;
}

.glass-sub {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  line-height: 1.5;
  max-width: 300px;
  margin-bottom: 28px;
}

.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 15px 36px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 100px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.2s;
}

.cta-btn:hover { opacity: 0.9; }
.cta-btn:active { opacity: 0.8; }

.cta-btn svg { width: 18px; height: 18px; }

/* ===== SECTION 2: BROWSE ===== */
.browse-section {
  position: relative;
  background: #000;
  padding: 36px 0 44px;
}

.section-label {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  text-align: center;
  margin-bottom: 24px;
  letter-spacing: 0.02em;
}

.carousel-wrapper {
  position: relative;
}

.carousel-track {
  display: flex;
  gap: 14px;
  padding: 0 calc(50vw - 105px);
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  cursor: grab;
  scroll-behavior: auto;
  scroll-snap-type: x mandatory;
}

.carousel-item { scroll-snap-align: center; }

.carousel-track::-webkit-scrollbar { display: none; }
.carousel-track:active { cursor: grabbing; }

.carousel-item {
  flex-shrink: 0;
  width: 210px;
  display: flex;
  flex-direction: column;
  align-items: center;
  will-change: transform, opacity;
  transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease;
}

.carousel-circle {
  width: 210px;
  height: 210px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  background-size: 300% 300%;
}

.carousel-circle .circle-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.18);
  text-align: center;
  padding: 16px;
}

.carousel-title {
  font-size: 21px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.carousel-meta {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 10px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 5px;
}

.browse-section + .browse-section { padding-top: 4px; }

/* Animated gradients */
@keyframes gFlow1 {
  0%   { background-position: 0% 0%; }
  25%  { background-position: 100% 50%; }
  50%  { background-position: 50% 100%; }
  75%  { background-position: 0% 50%; }
  100% { background-position: 0% 0%; }
}
@keyframes gFlow2 {
  0%   { background-position: 100% 100%; }
  33%  { background-position: 0% 50%; }
  66%  { background-position: 50% 0%; }
  100% { background-position: 100% 100%; }
}
@keyframes gFlow3 {
  0%   { background-position: 50% 0%; }
  50%  { background-position: 50% 100%; }
  100% { background-position: 50% 0%; }
}

.ag1 { animation: gFlow1 10s ease infinite; }
.ag2 { animation: gFlow2 12s ease infinite; }
.ag3 { animation: gFlow3 14s ease infinite; }

/* ===== ROULETTE (3D elliptical from v1) ===== */
.roulette-section {
  position: relative;
  background: #000;
  padding: 60px 0 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.roulette-label {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin-bottom: 32px;
  letter-spacing: 0.02em;
}

.roulette-container {
  position: relative;
  width: 340px;
  height: 280px;
}

.roulette-galaxy {
  position: relative;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.roulette-orb {
  position: absolute;
  border-radius: 50%;
  overflow: hidden;
  will-change: transform;
  background-size: 300% 300%;
}

.roulette-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.spin-btn {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.5);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  color: #fff;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}

.spin-btn:hover {
  border-color: rgba(255,255,255,0.45);
  transform: scale(1.06);
}

.spin-btn:active { transform: scale(0.96); }

.spin-result {
  text-align: center;
  margin-top: 24px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.spin-result.visible { opacity: 1; }

.spin-result-title {
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.spin-result-meta {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ===== FOOTER CTA ===== */
.footer-cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 32px 60px;
  min-height: 55dvh;
}

.footer-headline {
  font-size: 28px;
  font-weight: 500;
  line-height: 1.3;
  letter-spacing: -0.02em;
  margin-bottom: 36px;
  max-width: 320px;
}

.footer {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 28px 24px calc(28px + var(--sab));
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.footer-logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.04em;
}

.footer-links {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.footer-links a {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.2s;
}

.footer-links a:hover { color: #fff; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">OZ</div>
  <div class="search-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
  </div>
  <div class="profile-btn">E</div>
</header>

<!-- SECTION 1: HERO -->
<section class="hero" id="hero">
  <div class="hero-sticky">
    <div class="wheel-container">
      <div class="wheel" id="wheel"></div>
    </div>
    <div class="glass-panel" id="glassPanel"></div>
    <div class="glass-content" id="glassContent">
      <p class="glass-welcome">Welcome to OZ.</p>
      <h1 class="glass-headline">Stories Live Here.</h1>
      <p class="glass-sub">Original films and episodic worlds from a new generation of filmmakers.</p>
      <a href="#browse" class="cta-btn">
        Start Watching
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>
  </div>
</section>

<!-- SECTION 2: GENRES -->
<section class="browse-section" id="browse">
  <p class="section-label">Genres:</p>
  <div class="carousel-wrapper"><div class="carousel-track" id="genreCarousel"></div></div>
</section>

<!-- SECTION 2B: MORE TO EXPLORE -->
<section class="browse-section">
  <p class="section-label">More to explore:</p>
  <div class="carousel-wrapper"><div class="carousel-track" id="showCarousel"></div></div>
</section>

<!-- ROULETTE -->
<section class="roulette-section">
  <p class="roulette-label">Not sure what to watch?</p>
  <div class="roulette-container">
    <div class="roulette-galaxy" id="rouletteGalaxy"></div>
    <div class="roulette-center">
      <button class="spin-btn" id="spinBtn">Spin</button>
    </div>
  </div>
  <div class="spin-result" id="spinResult">
    <div class="spin-result-title" id="spinResultTitle"></div>
    <div class="spin-result-meta" id="spinResultMeta"></div>
  </div>
</section>

<!-- FOOTER CTA -->
<section class="footer-cta">
  <h2 class="footer-headline">The platform disappears.<br>The story remains.</h2>
  <a href="#hero" class="cta-btn">
    Start Watching
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"></line>
      <polyline points="12 5 19 12 12 19"></polyline>
    </svg>
  </a>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-logo">OZ</div>
  <div class="footer-links">
    <a href="#">Watch</a>
    <a href="#">Privacy Policy</a>
  </div>
</footer>

<script>
(function() {
  if (sessionStorage.getItem('oz_auth') !== '1') {
    window.location.href = 'login.html';
    return;
  }

  // ===== HERO WHEEL — equal sizes, equidistant =====
  const wheel = document.getElementById('wheel');
  const ORB_COUNT = 18;
  const ORB_SIZE = 54;
  const W = 340, CX = W / 2, CY = W / 2, RADIUS = 145;

  const orbGrads = [
    'linear-gradient(135deg, #e85d3a, #c44, #2a1a1a)',
    'linear-gradient(145deg, #f0c090, #d4956a, #3a2010)',
    'radial-gradient(circle at 45% 45%, #eee 8%, #aaa 30%, #444 65%, #181818)',
    'linear-gradient(135deg, #e8c860, #c9a84c, #3a2800)',
    'linear-gradient(150deg, #90ccee, #5588aa, #1a2a3a)',
    'linear-gradient(135deg, #ff6644, #cc4433, #2a0808)',
    'linear-gradient(135deg, #88cc88, #5a7a5a, #1a2a1a)',
    'linear-gradient(135deg, #bb88ff, #7a6a9a, #1a1a2a)',
    'linear-gradient(135deg, #88bbee, #446688, #0a1a2a)',
    'linear-gradient(135deg, #55cc88, #3a7a5a, #0a2a1a)',
    'linear-gradient(160deg, #ff8866, #cc5533, #331108)',
    'linear-gradient(140deg, #dd99cc, #995577, #220a18)',
    'linear-gradient(135deg, #aaddff, #5588bb, #0a1828)',
    'linear-gradient(150deg, #ffcc44, #aa8822, #2a1a00)',
    'linear-gradient(135deg, #44bbaa, #227766, #0a2a22)',
    'linear-gradient(145deg, #ff5577, #aa2244, #220510)',
    'linear-gradient(135deg, #99aaff, #5566aa, #0a0a2a)',
    'linear-gradient(155deg, #ffaa66, #aa6622, #2a1500)',
  ];

  const orbEls = [];

  for (let i = 0; i < ORB_COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'wheel-item';
    el.style.width = ORB_SIZE + 'px';
    el.style.height = ORB_SIZE + 'px';
    el.style.background = orbGrads[i];
    wheel.appendChild(el);
    orbEls.push(el);
  }

  let wAngle = 0, wAuto = 0.001, wDrag = false, wLastX = 0, wVel = 0;

  function layoutWheel() {
    for (let i = 0; i < ORB_COUNT; i++) {
      const a = wAngle + (i / ORB_COUNT) * Math.PI * 2;
      orbEls[i].style.left = (CX + Math.cos(a) * RADIUS - ORB_SIZE / 2) + 'px';
      orbEls[i].style.top = (CY + Math.sin(a) * RADIUS - ORB_SIZE / 2) + 'px';
    }
  }

  function animWheel() {
    if (!wDrag) { wAngle += wAuto + wVel; wVel *= 0.97; }
    layoutWheel();
    requestAnimationFrame(animWheel);
  }

  wheel.addEventListener('pointerdown', e => { wDrag = true; wLastX = e.clientX; wVel = 0; wheel.setPointerCapture(e.pointerId); });
  wheel.addEventListener('pointermove', e => { if (!wDrag) return; const dx = e.clientX - wLastX; wAngle += dx * 0.004; wVel = dx * 0.002; wLastX = e.clientX; });
  wheel.addEventListener('pointerup', () => { wDrag = false; });
  wheel.addEventListener('pointercancel', () => { wDrag = false; });

  animWheel();

  // ===== SCROLL-DRIVEN GLASS (transparent blur, not opaque) =====
  const hero = document.getElementById('hero');
  const glassPanel = document.getElementById('glassPanel');
  const glassContent = document.getElementById('glassContent');

  function updateGlass() {
    const rect = hero.getBoundingClientRect();
    const scrolled = -rect.top;
    const travel = hero.offsetHeight - window.innerHeight;
    const progress = Math.max(0, Math.min(1, scrolled / travel));
    const h = 50 + progress * 50;
    glassPanel.style.height = h + '%';
    glassContent.style.height = h + '%';
  }

  window.addEventListener('scroll', updateGlass, { passive: true });
  updateGlass();

  // ===== INFINITE CAROUSELS =====
  const genres = [
    { name: 'Anime',        count: '145 Series',   grad: 'linear-gradient(150deg, #1a3565, #2a5588, #0a1828, #1a3565)', anim: 'ag1' },
    { name: 'Horror',       count: '89 Series',    grad: 'linear-gradient(150deg, #601818, #882828, #200808, #601818)', anim: 'ag2' },
    { name: 'Action',       count: '120 Series',   grad: 'linear-gradient(150deg, #605020, #887030, #2a1a08, #605020)', anim: 'ag3' },
    { name: 'Comedy',       count: '95 Series',    grad: 'linear-gradient(150deg, #682020, #903838, #300a0a, #682020)', anim: 'ag1' },
    { name: 'Music',        count: '67 Series',    grad: 'linear-gradient(150deg, #382060, #582a88, #180a30, #382060)', anim: 'ag2' },
    { name: 'Wildlife',     count: '42 Series',    grad: 'linear-gradient(150deg, #1a4828, #2a6840, #0a1a10, #1a4828)', anim: 'ag3' },
    { name: 'Documentary',  count: '78 Series',    grad: 'linear-gradient(150deg, #383838, #505050, #141414, #383838)', anim: 'ag1' },
    { name: 'Experimental', count: '31 Series',    grad: 'linear-gradient(150deg, #483820, #685030, #1a100a, #483820)', anim: 'ag2' },
    { name: 'Sci-Fi',       count: '54 Series',    grad: 'linear-gradient(150deg, #0a3848, #1a5868, #051820, #0a3848)', anim: 'ag3' },
    { name: 'Romance',      count: '63 Series',    grad: 'linear-gradient(150deg, #482030, #682850, #1a0a15, #482030)', anim: 'ag1' },
  ];

  const showsData = [
    { name: 'Akira',          count: '4 Episodes',    grad: 'linear-gradient(150deg, #cc2200, #881500, #440a00, #cc2200)', anim: 'ag2' },
    { name: 'Die Hard',       count: '9 Episodes',    grad: 'linear-gradient(150deg, #384860, #506878, #1a2030, #384860)', anim: 'ag3' },
    { name: 'Mr Money',       count: '44 Episodes',   grad: 'linear-gradient(150deg, #2a6835, #186028, #0a3010, #2a6835)', anim: 'ag1' },
    { name: 'Little Robert',  count: '203 Episodes',  grad: 'linear-gradient(150deg, #5a3888, #3a1868, #1a0838, #5a3888)', anim: 'ag2' },
    { name: 'Ghost Frame',    count: '68 Episodes',   grad: 'linear-gradient(150deg, #184858, #286878, #0a2028, #184858)', anim: 'ag3' },
    { name: 'Typecast',       count: '1 Episode',     grad: 'linear-gradient(150deg, #605828, #484018, #282008, #605828)', anim: 'ag1' },
  ];

  function makeItemHTML(item) {
    return `<div class="carousel-circle ${item.anim}" style="background: ${item.grad}">
      <div class="circle-overlay">
        <span class="carousel-title">${item.name}</span>
        <span class="carousel-meta">${item.count}</span>
      </div>
    </div>`;
  }

  function buildInfiniteCarousel(containerId, data) {
    const track = document.getElementById(containerId);
    for (let s = 0; s < 5; s++) {
      data.forEach(item => {
        const el = document.createElement('div');
        el.className = 'carousel-item';
        el.innerHTML = makeItemHTML(item);
        track.appendChild(el);
      });
    }

    const itemW = 210 + 14;
    const oneSetW = data.length * itemW;

    track.scrollLeft = oneSetW * 2;

    function loopCheck() {
      const sl = track.scrollLeft;
      if (sl < oneSetW) {
        track.scrollLeft += oneSetW;
      } else if (sl > oneSetW * 3) {
        track.scrollLeft -= oneSetW;
      }
    }

    track.addEventListener('scroll', () => {
      loopCheck();
      applySpatial(track);
    }, { passive: true });

    applySpatial(track);
  }

  function applySpatial(track) {
    const rect = track.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    track.querySelectorAll('.carousel-item').forEach(item => {
      const ir = item.getBoundingClientRect();
      const ic = ir.left + ir.width / 2;
      const dist = Math.abs(center - ic);
      const max = rect.width * 0.55;
      const ratio = Math.min(dist / max, 1);
      const scale = 1 - ratio * 0.15;
      const opacity = 1 - ratio * 0.28;
      const brightness = 1 - ratio * 0.1;
      item.style.transform = `scale(${scale})`;
      item.style.opacity = opacity;
      item.style.filter = `brightness(${brightness})`;
    });
  }

  buildInfiniteCarousel('genreCarousel', genres);
  buildInfiniteCarousel('showCarousel', showsData);

  // ===== 3D ROULETTE (from v1 style) =====
  const rGalaxy = document.getElementById('rouletteGalaxy');
  const allShows = [
    ...showsData,
    { name: 'Anime Mix', count: 'Curated', grad: genres[0].grad, anim: 'ag1' },
    { name: 'Horror Mix', count: 'Curated', grad: genres[1].grad, anim: 'ag2' },
    { name: 'Action Mix', count: 'Curated', grad: genres[2].grad, anim: 'ag3' },
    { name: 'Sci-Fi Mix', count: 'Curated', grad: genres[8].grad, anim: 'ag1' },
  ];

  const rCount = allShows.length;
  const rCX = 170, rCY = 140, rRX = 140, rRY = 80;
  const rOrbSize = 60;
  const rOrbs = [];

  allShows.forEach((show, i) => {
    const el = document.createElement('div');
    el.className = 'roulette-orb ' + show.anim;
    el.style.width = rOrbSize + 'px';
    el.style.height = rOrbSize + 'px';
    el.style.background = show.grad;
    rGalaxy.appendChild(el);
    rOrbs.push(el);
  });

  let rAngle = 0, rAuto = 0.002, rSpinVel = 0, rSpinning = false;

  function layoutRoulette() {
    for (let i = 0; i < rCount; i++) {
      const a = rAngle + (i / rCount) * Math.PI * 2;
      const x = rCX + Math.cos(a) * rRX - rOrbSize / 2;
      const y = rCY + Math.sin(a) * rRY - rOrbSize / 2;
      const depth = (Math.sin(a) + 1) / 2;
      const scale = 0.65 + depth * 0.35;
      const z = Math.floor(depth * 10);
      rOrbs[i].style.left = x + 'px';
      rOrbs[i].style.top = y + 'px';
      rOrbs[i].style.transform = `scale(${scale})`;
      rOrbs[i].style.zIndex = z;
      rOrbs[i].style.opacity = (0.4 + depth * 0.6).toFixed(2);
    }
  }

  function animRoulette() {
    if (rSpinning) {
      rAngle += rSpinVel;
      rSpinVel *= 0.985;
      if (Math.abs(rSpinVel) < 0.0005) {
        rSpinning = false;
        rSpinVel = 0;
        showSpinResult();
      }
    } else {
      rAngle += rAuto;
    }
    layoutRoulette();
    requestAnimationFrame(animRoulette);
  }

  function showSpinResult() {
    let closest = 0, minDist = Infinity;
    for (let i = 0; i < rCount; i++) {
      const a = rAngle + (i / rCount) * Math.PI * 2;
      const norm = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const dist = Math.abs(norm - Math.PI * 1.5);
      if (dist < minDist) { minDist = dist; closest = i; }
    }
    const show = allShows[closest];
    document.getElementById('spinResultTitle').textContent = show.name;
    document.getElementById('spinResultMeta').textContent = show.count;
    document.getElementById('spinResult').classList.add('visible');
  }

  document.getElementById('spinBtn').addEventListener('click', () => {
    if (rSpinning) return;
    rSpinning = true;
    rSpinVel = 0.15 + Math.random() * 0.1;
    document.getElementById('spinResult').classList.remove('visible');
  });

  animRoulette();

})();
</script>
</body>
</html>
