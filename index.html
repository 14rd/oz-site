<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OZ</title>
<style>
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro'), local('NeueHaasDisplay-Roman'), local('Helvetica Neue');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro Medium'), local('NeueHaasDisplay-Medium'), local('Helvetica Neue Medium');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro Bold'), local('NeueHaasDisplay-Bold'), local('Helvetica Neue Bold');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasText';
  src: local('Neue Haas Grotesk Text Pro'), local('NeueHaasText-Roman'), local('Helvetica Neue');
  font-weight: 400;
  font-style: normal;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'NeueHaasDisplay', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #000;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  min-height: 100dvh;
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  padding: calc(14px + var(--sat)) 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  pointer-events: none;
}

.header > * { pointer-events: auto; }

.header-logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.04em;
  flex-shrink: 0;
  cursor: pointer;
}

.search-bar {
  flex: 1;
  max-width: 280px;
  height: 38px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.3s, background 0.3s;
  background: rgba(0,0,0,0.25);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  backdrop-filter: blur(24px) saturate(1.3);
}

.search-bar:hover { border-color: rgba(255,255,255,0.35); }

.search-bar svg {
  width: 15px;
  height: 15px;
  stroke: rgba(255,255,255,0.4);
}

.profile-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
  cursor: pointer;
  transition: border-color 0.3s;
  background: rgba(0,0,0,0.25);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  backdrop-filter: blur(24px) saturate(1.3);
  text-decoration: none;
  color: #fff;
}

.profile-btn:hover { border-color: rgba(255,255,255,0.35); }

/* ===== SEARCH OVERLAY ===== */
.search-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.92);
  -webkit-backdrop-filter: blur(40px);
  backdrop-filter: blur(40px);
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.search-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.search-overlay-header {
  padding: calc(14px + var(--sat)) 20px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.search-input {
  flex: 1;
  height: 42px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 100px;
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-family: inherit;
  font-size: 15px;
  padding: 0 20px;
  outline: none;
  transition: border-color 0.3s;
}

.search-input:focus { border-color: rgba(255,255,255,0.4); }
.search-input::placeholder { color: rgba(255,255,255,0.3); }

.search-close {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  transition: color 0.2s;
}

.search-close:hover { color: #fff; }

.search-results {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
}

.search-results-empty {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  color: rgba(255,255,255,0.3);
  text-align: center;
  margin-top: 60px;
}

.search-result-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: opacity 0.2s;
  text-decoration: none;
  color: #fff;
}

.search-result-item:hover { opacity: 0.7; }

.search-result-thumb {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  background: #111;
}

.search-result-thumb video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.search-result-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.search-result-name {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.search-result-type {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ===== SECTION 1: HERO ===== */
.hero {
  position: relative;
  height: 200dvh;
}

.hero-sticky {
  position: sticky;
  top: 0;
  height: 100dvh;
  overflow: hidden;
}

.wheel-container {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wheel {
  position: relative;
  width: 340px;
  height: 340px;
  touch-action: none;
}

.wheel-item {
  position: absolute;
  border-radius: 50%;
  overflow: hidden;
  will-change: transform;
  cursor: pointer;
  background: #111;
}

.wheel-item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

.glass-panel {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 50%;
  background: rgba(0,0,0,0.55);
  -webkit-backdrop-filter: blur(40px) saturate(1.2);
  backdrop-filter: blur(40px) saturate(1.2);
  z-index: 10;
  will-change: height;
  transition: height 0.05s linear;
}

.glass-content {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 11;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 28px 40px;
  height: 50%;
  will-change: height;
  transition: height 0.05s linear;
}

.glass-welcome {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.6);
  margin-bottom: 14px;
  letter-spacing: 0.02em;
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
}

.glass-headline {
  font-size: 34px;
  font-weight: 500;
  line-height: 1.08;
  letter-spacing: -0.025em;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
}

.glass-sub {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  line-height: 1.5;
  max-width: 300px;
  margin-bottom: 28px;
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
}

.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 15px 36px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 100px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
}

.cta-btn:hover { opacity: 0.9; transform: scale(1.02); }
.cta-btn:active { opacity: 0.8; transform: scale(0.98); }

.cta-btn svg { width: 18px; height: 18px; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* ===== SECTION 2: BROWSE ===== */
.browse-section {
  position: relative;
  background: #000;
  padding: 36px 0 44px;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.browse-section.revealed {
  opacity: 1;
  transform: translateY(0);
}

.section-label {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  text-align: center;
  margin-bottom: 24px;
  letter-spacing: 0.02em;
}

.carousel-wrapper {
  position: relative;
}

.carousel-track {
  display: flex;
  gap: 14px;
  padding: 0 calc(50vw - 105px);
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  cursor: grab;
  scroll-behavior: auto;
  scroll-snap-type: x mandatory;
}

.carousel-item { scroll-snap-align: center; }

.carousel-track::-webkit-scrollbar { display: none; }
.carousel-track:active { cursor: grabbing; }

.carousel-item {
  flex-shrink: 0;
  width: 210px;
  display: flex;
  flex-direction: column;
  align-items: center;
  will-change: transform, opacity;
  transition: transform 0.12s ease-out, opacity 0.12s ease-out, filter 0.12s ease-out;
  cursor: pointer;
  text-decoration: none;
  color: #fff;
}

.carousel-circle {
  width: 210px;
  height: 210px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  background: #111;
}

.carousel-circle video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.carousel-circle .circle-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.25);
  text-align: center;
  padding: 16px;
  transition: background 0.3s;
}

.carousel-item:hover .circle-overlay { background: rgba(0,0,0,0.15); }

.carousel-title {
  font-size: 21px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.carousel-meta {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 10px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 5px;
}

.browse-section + .browse-section { padding-top: 4px; }

/* ===== ROULETTE ===== */
.roulette-section {
  position: relative;
  background: #000;
  padding: 80px 0 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.roulette-section.revealed {
  opacity: 1;
  transform: translateY(0);
}

.roulette-label {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.4);
  text-align: center;
  margin-bottom: 40px;
  letter-spacing: 0.02em;
}

.roulette-container {
  position: relative;
  width: 340px;
  height: 300px;
}

.roulette-galaxy {
  position: relative;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.roulette-orb {
  position: absolute;
  border-radius: 50%;
  overflow: hidden;
  will-change: transform;
  background: #111;
  transition: box-shadow 0.4s ease;
}

.roulette-orb video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.roulette-orb.highlighted {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.8), 0 0 30px rgba(255,255,255,0.15);
}

.roulette-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.spin-btn {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.5);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  color: #fff;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.3s, transform 0.3s;
}

.spin-btn:hover {
  border-color: rgba(255,255,255,0.45);
  transform: scale(1.06);
}

.spin-btn:active { transform: scale(0.96); }

.spin-result {
  text-align: center;
  margin-top: 32px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.spin-result.visible {
  opacity: 1;
  transform: translateY(0);
}

.spin-result-title {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

.spin-result-meta {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 5px;
}

.spin-result-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 18px;
  padding: 12px 28px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 100px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.2s, transform 0.2s;
}

.spin-result-cta:hover { opacity: 0.9; transform: scale(1.02); }
.spin-result-cta:active { opacity: 0.8; }

.spin-result-cta svg { width: 14px; height: 14px; }

.spin-again {
  display: block;
  margin-top: 12px;
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  background: none;
  border: none;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: color 0.2s;
}

.spin-again:hover { color: rgba(255,255,255,0.7); }

/* ===== FOOTER CTA ===== */
.footer-cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 32px 60px;
  min-height: 55dvh;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.footer-cta.revealed {
  opacity: 1;
  transform: translateY(0);
}

.footer-headline {
  font-size: 28px;
  font-weight: 500;
  line-height: 1.3;
  letter-spacing: -0.02em;
  margin-bottom: 36px;
  max-width: 320px;
}

.footer-cta .cta-btn {
  opacity: 1;
  transform: none;
  animation: none;
}

.footer {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 28px 24px calc(28px + var(--sab));
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.footer-logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.04em;
}

.footer-links {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.footer-links a {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.2s;
}

.footer-links a:hover { color: #fff; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">OZ</div>
  <div class="search-bar" id="searchTrigger">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
  </div>
  <a href="profile.html" class="profile-btn">E</a>
</header>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-overlay-header">
    <input type="text" class="search-input" id="searchInput" placeholder="Search shows, genres..." autocomplete="off">
    <button class="search-close" id="searchClose">Cancel</button>

  <div class="search-results" id="searchResults">
    <p class="search-results-empty" id="searchEmpty">Search OZ</p>

</div>

<!-- SECTION 1: HERO -->

      <h1 class="glass-headline">Stories Live Here.</h1>
      <p class="glass-sub">Original films and episodic worlds from a new generation of filmmakers.</p>
      <a href="watch.html" class="cta-btn">
        Start Watching
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>

</section>

<!-- SECTION 2: GENRES -->
<section class="browse-section" id="browse">

<!-- SECTION 2B: MORE TO EXPLORE -->
<section class="browse-section">
  <p class="section-label">More to explore:</p>
  <div class="carousel-wrapper"><div class="carousel-track" id="showCarousel"></div></div>
</section>

<!-- ROULETTE -->
<section class="roulette-section">
  <p class="roulette-label">Not sure what to watch?</p>
  <div class="roulette-container">
    <div class="roulette-galaxy" id="rouletteGalaxy"></div>

      <button class="spin-btn" id="spinBtn">Spin</button>
    </div>
  </div>
  <div class="spin-result" id="spinResult">
    <div class="spin-result-title" id="spinResultTitle"></div>
    <div class="spin-result-meta" id="spinResultMeta"></div>
    <a href="watch.html" class="spin-result-cta" id="spinResultCta">
      Watch Now
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
    </a>
    <button class="spin-again" id="spinAgain">Spin Again</button>
  </div>
</section>

<!-- FOOTER CTA -->
<section class="footer-cta">
  <h2 class="footer-headline">The platform disappears.<br>The story remains.</h2>
  <a href="watch.html" class="cta-btn">
    Start Watching
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"></line>
      <polyline points="12 5 19 12 12 19"></polyline>
    </svg>
  </a>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-logo">OZ</div>
  <div class="footer-links">
    <a href="watch.html">Watch</a>
    <a href="#">Privacy Policy</a>
  </div>
</footer>

<script>
(function() {
  if (sessionStorage.getItem('oz_auth') !== '1') {
    window.location.href = 'login.html';
    return;
  }

  const VIDEOS = [
    'assets/newvideos/v09044g40000cpjiudvog65uits9edag.mp4',
    'assets/newvideos/v12044gd0000cv3phmfog65o2ru4trag.mp4',
    'assets/newvideos/v14044g50000ctlcd37og65u8r34q9t0.mp4',
    'assets/newvideos/v1c044g50000d7l4pmvog65mvpm1tb4g.mp4',
    'assets/newvideos/v24044gl0000d340qgnog65q6e5i5h5g.mp4',
  ];

  let vidIdx = 0;
  function nextVideo() {
    const v = VIDEOS[vidIdx % VIDEOS.length];
    vidIdx++;
    return v;
  }

  function makeVideo(src) {
    const v = document.createElement('video');
    v.src = src;
    v.muted = true;
    v.loop = true;
    v.playsInline = true;
    v.autoplay = true;
    v.setAttribute('playsinline', '');
    v.setAttribute('webkit-playsinline', '');
    v.preload = 'auto';
    return v;
  }

  // ===== HERO WHEEL =====
  const wheel = document.getElementById('wheel');
  const ORB_COUNT = 18;
  const ORB_SIZE = 50;
  const W = 340, CX = W / 2, CY = W / 2, RADIUS = 148;

  const orbEls = [];
  for (let i = 0; i < ORB_COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'wheel-item';
    el.style.width = ORB_SIZE + 'px';
    el.style.height = ORB_SIZE + 'px';
    el.appendChild(makeVideo(nextVideo()));
    wheel.appendChild(el);
    orbEls.push(el);
  }

  let wAngle = 0, wAuto = 0.001, wDrag = false, wLastX = 0, wVel = 0, wLastTime = 0;

  function layoutWheel() {
    for (let i = 0; i < ORB_COUNT; i++) {
      const a = wAngle + (i / ORB_COUNT) * Math.PI * 2;
      const x = CX + Math.cos(a) * RADIUS - ORB_SIZE / 2;
      const y = CY + Math.sin(a) * RADIUS - ORB_SIZE / 2;
      orbEls[i].style.left = x + 'px';
      orbEls[i].style.top = y + 'px';
    }
  }

  function animWheel() {
    if (!wDrag) {
      wAngle += wAuto + wVel;
      wVel *= 0.96;
      if (Math.abs(wVel) < 0.00005) wVel = 0;
    }
    layoutWheel();
    requestAnimationFrame(animWheel);
  }

  wheel.addEventListener('pointerdown', e => {
    wDrag = true; wLastX = e.clientX; wVel = 0; wLastTime = Date.now();
    wheel.setPointerCapture(e.pointerId);
  });
  wheel.addEventListener('pointermove', e => {
    if (!wDrag) return;
    const dx = e.clientX - wLastX;
    const now = Date.now();
    const dt = Math.max(now - wLastTime, 1);
    wAngle += dx * 0.004;
    wVel = (dx * 0.003) / (dt / 16);
    wLastX = e.clientX;
    wLastTime = now;
  });
  wheel.addEventListener('pointerup', () => { wDrag = false; });
  wheel.addEventListener('pointercancel', () => { wDrag = false; });

  animWheel();

  // ===== SCROLL-DRIVEN GLASS =====
  const hero = document.getElementById('hero');
  const glassPanel = document.getElementById('glassPanel');
  const glassContent = document.getElementById('glassContent');
  let lastGlassH = 50;

  function updateGlass() {
    const rect = hero.getBoundingClientRect();
    const scrolled = -rect.top;
    const travel = hero.offsetHeight - window.innerHeight;
    const progress = Math.max(0, Math.min(1, scrolled / travel));
    const h = 50 + progress * 50;
    if (Math.abs(h - lastGlassH) > 0.1) {
      lastGlassH = h;
      glassPanel.style.height = h + '%';
      glassContent.style.height = h + '%';
    }
  }

  window.addEventListener('scroll', updateGlass, { passive: true });
  updateGlass();

  // ===== SCROLL REVEAL =====
  const revealEls = document.querySelectorAll('.browse-section, .roulette-section, .footer-cta');
  const revealObs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        revealObs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  revealEls.forEach(el => revealObs.observe(el));

  // ===== DATA =====
  const genres = [
    { name: 'Anime',        count: '145 Series',   type: 'genre' },
    { name: 'Horror',       count: '89 Series',    type: 'genre' },
    { name: 'Action',       count: '120 Series',   type: 'genre' },
    { name: 'Comedy',       count: '95 Series',    type: 'genre' },
    { name: 'Music',        count: '67 Series',    type: 'genre' },
    { name: 'Wildlife',     count: '42 Series',    type: 'genre' },
    { name: 'Documentary',  count: '78 Series',    type: 'genre' },
    { name: 'Experimental', count: '31 Series',    type: 'genre' },
    { name: 'Sci-Fi',       count: '54 Series',    type: 'genre' },
    { name: 'Romance',      count: '63 Series',    type: 'genre' },
  ];

  const showsData = [
    { name: 'Akira',          count: '4 Episodes',    type: 'show' },
    { name: 'Die Hard',       count: '9 Episodes',    type: 'show' },
    { name: 'Mr Money',       count: '44 Episodes',   type: 'show' },
    { name: 'Little Robert',  count: '203 Episodes',  type: 'show' },
    { name: 'Ghost Frame',    count: '68 Episodes',   type: 'show' },
    { name: 'Typecast',       count: '1 Episode',     type: 'show' },
  ];

  const allItems = [...genres, ...showsData];

  // ===== INFINITE CAROUSELS WITH VIDEO =====
  function buildInfiniteCarousel(containerId, data) {
    const track = document.getElementById(containerId);
    for (let s = 0; s < 5; s++) {
      data.forEach(item => {
        const el = document.createElement('a');
        el.className = 'carousel-item';
        el.href = 'watch.html?q=' + encodeURIComponent(item.name);

        const circle = document.createElement('div');
        circle.className = 'carousel-circle';
        circle.appendChild(makeVideo(nextVideo()));

        const overlay = document.createElement('div');
        overlay.className = 'circle-overlay';
        overlay.innerHTML = `<span class="carousel-title">${item.name}</span><span class="carousel-meta">${item.count}</span>`;
        circle.appendChild(overlay);
        el.appendChild(circle);
        track.appendChild(el);
      });
    }

    const itemW = 210 + 14;
    const oneSetW = data.length * itemW;
    track.scrollLeft = oneSetW * 2;

    function loopCheck() {
      const sl = track.scrollLeft;
      if (sl < oneSetW) track.scrollLeft += oneSetW;
      else if (sl > oneSetW * 3) track.scrollLeft -= oneSetW;
    }

    track.addEventListener('scroll', () => {
      loopCheck();
      applySpatial(track);
    }, { passive: true });

    applySpatial(track);
  }

  function applySpatial(track) {
    const rect = track.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    track.querySelectorAll('.carousel-item').forEach(item => {
      const ir = item.getBoundingClientRect();
      const ic = ir.left + ir.width / 2;
      const dist = Math.abs(center - ic);
      const max = rect.width * 0.55;
      const ratio = Math.min(dist / max, 1);
      const scale = 1 - ratio * 0.15;
      const opacity = 1 - ratio * 0.28;
      const brightness = 1 - ratio * 0.1;
      item.style.transform = `scale(${scale})`;
      item.style.opacity = opacity;
      item.style.filter = `brightness(${brightness})`;
    });
  }

  buildInfiniteCarousel('genreCarousel', genres);
  buildInfiniteCarousel('showCarousel', showsData);

  // ===== 3D ROULETTE WITH VIDEO =====
  const rGalaxy = document.getElementById('rouletteGalaxy');
  const allShows = [
    ...showsData,
    { name: 'Anime Mix', count: 'Curated', type: 'genre' },
    { name: 'Horror Mix', count: 'Curated', type: 'genre' },
    { name: 'Action Mix', count: 'Curated', type: 'genre' },
    { name: 'Sci-Fi Mix', count: 'Curated', type: 'genre' },
  ];

  const rCount = allShows.length;
  const rCX = 170, rCY = 150, rRX = 145, rRY = 85;
  const rOrbSize = 58;
  const rOrbs = [];

  allShows.forEach((show) => {
    const el = document.createElement('div');
    el.className = 'roulette-orb';
    el.style.width = rOrbSize + 'px';
    el.style.height = rOrbSize + 'px';
    el.appendChild(makeVideo(nextVideo()));
    rGalaxy.appendChild(el);
    rOrbs.push(el);
  });

  let rAngle = 0, rAuto = 0.002, rSpinVel = 0, rSpinning = false;

  function getClosestOrb() {
    let closest = 0, minDist = Infinity;
    for (let i = 0; i < rCount; i++) {
      const a = rAngle + (i / rCount) * Math.PI * 2;
      const norm = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const dist = Math.abs(norm - Math.PI * 1.5);
      if (dist < minDist) { minDist = dist; closest = i; }
    }
    return closest;
  }

  function layoutRoulette() {
    const closestIdx = rSpinning ? -1 : getClosestOrb();
    for (let i = 0; i < rCount; i++) {
      const a = rAngle + (i / rCount) * Math.PI * 2;
      const x = rCX + Math.cos(a) * rRX - rOrbSize / 2;
      const y = rCY + Math.sin(a) * rRY - rOrbSize / 2;
      const depth = (Math.sin(a) + 1) / 2;
      const scale = 0.6 + depth * 0.4;
      const z = Math.floor(depth * 10);
      rOrbs[i].style.left = x + 'px';
      rOrbs[i].style.top = y + 'px';
      rOrbs[i].style.transform = `scale(${scale})`;
      rOrbs[i].style.zIndex = z;
      rOrbs[i].style.opacity = (0.35 + depth * 0.65).toFixed(2);

      if (i === closestIdx && !rSpinning) {
        rOrbs[i].classList.add('highlighted');
      } else {
        rOrbs[i].classList.remove('highlighted');
      }
    }
  }

  function animRoulette() {
    if (rSpinning) {
      rAngle += rSpinVel;
      rSpinVel *= 0.985;
      if (Math.abs(rSpinVel) < 0.0005) {
        rSpinning = false;
        rSpinVel = 0;
        showSpinResult();
      }
    } else {
      rAngle += rAuto;
    }
    layoutRoulette();
    requestAnimationFrame(animRoulette);
  }

  function showSpinResult() {
    const closest = getClosestOrb();
    const show = allShows[closest];
    document.getElementById('spinResultTitle').textContent = show.name;
    document.getElementById('spinResultMeta').textContent = show.count;
    document.getElementById('spinResultCta').href = 'watch.html?q=' + encodeURIComponent(show.name);
    document.getElementById('spinResult').classList.add('visible');
  }

  document.getElementById('spinBtn').addEventListener('click', () => {
    if (rSpinning) return;
    rSpinning = true;
    rSpinVel = 0.15 + Math.random() * 0.1;
    document.getElementById('spinResult').classList.remove('visible');
  });

  document.getElementById('spinAgain').addEventListener('click', () => {
    if (rSpinning) return;
    rSpinning = true;
    rSpinVel = 0.15 + Math.random() * 0.1;
    document.getElementById('spinResult').classList.remove('visible');
  });

  animRoulette();

  // ===== SEARCH =====
  const searchOverlay = document.getElementById('searchOverlay');
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  const searchEmpty = document.getElementById('searchEmpty');

  document.getElementById('searchTrigger').addEventListener('click', () => {
    searchOverlay.classList.add('active');
    setTimeout(() => searchInput.focus(), 100);
  });

  document.getElementById('searchClose').addEventListener('click', () => {
    searchOverlay.classList.remove('active');
    searchInput.value = '';
    searchResults.innerHTML = '';
    searchResults.appendChild(searchEmpty);
    searchEmpty.textContent = 'Search OZ';
  });

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    searchResults.innerHTML = '';

    if (!q) {
      searchResults.appendChild(searchEmpty);
      searchEmpty.textContent = 'Search OZ';
      return;
    }

    const matches = allItems.filter(item =>
      item.name.toLowerCase().includes(q) || item.type.toLowerCase().includes(q)
    );

    if (matches.length === 0) {
      searchResults.appendChild(searchEmpty);
      searchEmpty.textContent = 'No results found';
      return;
    }

    matches.forEach(item => {
      const a = document.createElement('a');
      a.className = 'search-result-item';
      a.href = 'watch.html?q=' + encodeURIComponent(item.name);

      const thumb = document.createElement('div');
      thumb.className = 'search-result-thumb';
      thumb.appendChild(makeVideo(nextVideo()));

      const info = document.createElement('div');
      info.className = 'search-result-info';
      info.innerHTML = `<span class="search-result-name">${item.name}</span><span class="search-result-type">${item.type} · ${item.count}</span>`;

      a.appendChild(thumb);
      a.appendChild(info);
      searchResults.appendChild(a);
    });
  });

})();
</script>
</body>
</html>
