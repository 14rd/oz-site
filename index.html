<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OZ</title>
<style>
@font-face{font-family:'NeueHaasDisplay';src:local('Neue Haas Grotesk Display Pro'),local('NeueHaasDisplay-Roman'),local('Helvetica Neue');font-weight:400;font-style:normal}
@font-face{font-family:'NeueHaasDisplay';src:local('Neue Haas Grotesk Display Pro Medium'),local('NeueHaasDisplay-Medium'),local('Helvetica Neue Medium');font-weight:500;font-style:normal}
@font-face{font-family:'NeueHaasDisplay';src:local('Neue Haas Grotesk Display Pro Bold'),local('NeueHaasDisplay-Bold'),local('Helvetica Neue Bold');font-weight:700;font-style:normal}
@font-face{font-family:'NeueHaasText';src:local('Neue Haas Grotesk Text Pro'),local('NeueHaasText-Roman'),local('Helvetica Neue');font-weight:400;font-style:normal}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
body{font-family:'NeueHaasDisplay','Helvetica Neue',Helvetica,Arial,sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden;min-height:100dvh;opacity:0}

.header{position:fixed;top:0;left:0;right:0;z-index:200;padding:calc(14px + var(--sat)) 20px 14px;display:flex;align-items:center;justify-content:space-between;gap:14px;pointer-events:none;opacity:0;transform:translateY(-8px)}
.header>*{pointer-events:auto}
.header-logo{font-size:22px;font-weight:700;letter-spacing:-0.04em;flex-shrink:0;cursor:pointer;text-decoration:none;color:#fff}
.search-bar{flex:1;max-width:280px;height:38px;border:1px solid rgba(255,255,255,0.15);border-radius:100px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.3s;background:rgba(0,0,0,0.25);-webkit-backdrop-filter:blur(24px) saturate(1.3);backdrop-filter:blur(24px) saturate(1.3)}
.search-bar:hover{border-color:rgba(255,255,255,0.35)}
.search-bar svg{width:15px;height:15px;stroke:rgba(255,255,255,0.4)}
.profile-btn{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;cursor:pointer;transition:border-color 0.3s;background:rgba(0,0,0,0.25);-webkit-backdrop-filter:blur(24px) saturate(1.3);backdrop-filter:blur(24px) saturate(1.3);text-decoration:none;color:#fff}
.profile-btn:hover{border-color:rgba(255,255,255,0.35)}

/* Search overlay */
.search-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.92);-webkit-backdrop-filter:blur(40px);backdrop-filter:blur(40px);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
.search-overlay.active{opacity:1;pointer-events:auto}
.search-overlay-header{padding:calc(14px + var(--sat)) 20px 14px;display:flex;align-items:center;gap:12px}
.search-input{flex:1;height:42px;border:1px solid rgba(255,255,255,0.2);border-radius:100px;background:rgba(255,255,255,0.06);color:#fff;font-family:inherit;font-size:15px;padding:0 20px;outline:none}
.search-input::placeholder{color:rgba(255,255,255,0.3)}
.search-close{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;padding:8px}
.search-results{flex:1;overflow-y:auto;padding:24px 20px}
.search-results-empty{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;color:rgba(255,255,255,0.3);text-align:center;margin-top:60px}
.search-result-item{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:opacity 0.2s;text-decoration:none;color:#fff}
.search-result-item:hover{opacity:0.7}
.search-result-thumb{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#111}
.search-result-thumb video{width:100%;height:100%;object-fit:cover}
.search-result-info{display:flex;flex-direction:column;gap:3px}
.search-result-name{font-size:16px;font-weight:500;letter-spacing:-0.01em}
.search-result-type{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.08em;text-transform:uppercase}

/* Hero */
.hero{position:relative;height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.wheel-container{position:relative;opacity:0}
.wheel{position:relative;width:370px;height:370px;touch-action:none}
.wheel-item{position:absolute;border-radius:50%;overflow:hidden;will-change:transform;cursor:pointer;background:#0a0a0a}
.wheel-item video{width:100%;height:100%;object-fit:cover;pointer-events:none}

/* Hero overlay */
.hero-overlay{position:absolute;left:0;right:0;bottom:0;height:50%;background:#000;z-index:10;display:flex;flex-direction:column;align-items:center;text-align:center;padding:56px 28px 0}
.hero-welcome{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;font-weight:400;color:rgba(255,255,255,0.7);margin-bottom:32px;letter-spacing:0.02em;opacity:0;transform:translateY(30px);transition:opacity 1.2s cubic-bezier(0.16,1,0.3,1),transform 1.2s cubic-bezier(0.16,1,0.3,1)}
.hero-headline{font-size:34px;font-weight:500;line-height:1.08;letter-spacing:-0.025em;margin-bottom:14px;opacity:0;transform:translateY(30px);transition:opacity 1.2s cubic-bezier(0.16,1,0.3,1),transform 1.2s cubic-bezier(0.16,1,0.3,1)}
.hero-sub{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;font-weight:400;color:rgba(255,255,255,0.6);line-height:1.5;max-width:300px;margin-bottom:28px;opacity:0;transform:translateY(30px);transition:opacity 1.2s cubic-bezier(0.16,1,0.3,1),transform 1.2s cubic-bezier(0.16,1,0.3,1)}
.hero-overlay .cta-btn{opacity:0;transform:translateY(30px);transition:opacity 1.2s cubic-bezier(0.16,1,0.3,1),transform 1.2s cubic-bezier(0.16,1,0.3,1)}
.hero-overlay.entered .hero-welcome{opacity:1;transform:translateY(0);transition-delay:0.2s}
.hero-overlay.entered .hero-headline{opacity:1;transform:translateY(0);transition-delay:0.45s}
.hero-overlay.entered .hero-sub{opacity:1;transform:translateY(0);transition-delay:0.7s}
.hero-overlay.entered .cta-btn{opacity:1;transform:translateY(0);transition-delay:0.95s}
.cta-btn{display:inline-flex;align-items:center;gap:14px;padding:15px 36px;background:#fff;color:#000;border:none;border-radius:100px;font-family:inherit;font-size:13px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:opacity 0.2s,transform 0.2s}
.cta-btn:hover{opacity:0.9;transform:scale(1.02)}
.cta-btn:active{opacity:0.8;transform:scale(0.98)}
.cta-btn svg{width:18px;height:18px}

/* Browse */
.browse-section{position:relative;background:#000;padding:16px 0 24px;opacity:0;transform:translateY(60px) scale(0.97);transition:opacity 1.6s cubic-bezier(0.16,1,0.3,1),transform 1.6s cubic-bezier(0.16,1,0.3,1)}
.browse-section.revealed{opacity:1;transform:translateY(0) scale(1)}
.section-label{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;font-weight:400;color:rgba(255,255,255,0.45);text-align:center;margin-bottom:24px;letter-spacing:0.02em;opacity:0;transform:translateY(12px);transition:opacity 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s,transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s}
.browse-section.revealed .section-label{opacity:1;transform:translateY(0)}
.carousel-track{display:flex;gap:14px;padding:0 calc(50vw - 95px);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(0.16,1,0.3,1) 0.25s,transform 1s cubic-bezier(0.16,1,0.3,1) 0.25s}
.carousel-track::-webkit-scrollbar{display:none}
.browse-section.revealed .carousel-track{opacity:1;transform:translateY(0)}
.carousel-item{flex-shrink:0;width:190px;display:flex;flex-direction:column;align-items:center;cursor:pointer;text-decoration:none;color:#fff;scroll-snap-align:center}
.carousel-circle{width:190px;height:190px;border-radius:50%;overflow:hidden;position:relative;background:#0a0a0a}
.carousel-circle video{width:100%;height:100%;object-fit:cover}
.carousel-circle .circle-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);text-align:center;padding:16px;transition:background 0.3s}
.carousel-item:hover .circle-overlay{background:rgba(0,0,0,0.15)}
.carousel-title{font-size:20px;font-weight:500;letter-spacing:-0.01em}
.carousel-meta{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10px;font-weight:400;color:rgba(255,255,255,0.55);letter-spacing:0.1em;text-transform:uppercase;margin-top:5px}
.browse-section+.browse-section{padding-top:56px}

/* Roulette */
.roulette-section{position:relative;background:#000;padding:120px 0 60px;display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(60px) scale(0.97);transition:opacity 1.6s cubic-bezier(0.16,1,0.3,1),transform 1.6s cubic-bezier(0.16,1,0.3,1)}
.roulette-section.revealed{opacity:1;transform:translateY(0) scale(1)}
.roulette-container{position:relative;width:340px;height:260px}
.roulette-galaxy{position:relative;width:100%;height:100%;touch-action:none}
.roulette-orb{position:absolute;border-radius:50%;overflow:hidden;will-change:transform;background:#0a0a0a;transition:box-shadow 0.5s ease,opacity 0.6s ease,filter 0.6s ease}
.roulette-orb video{width:100%;height:100%;object-fit:cover}
.roulette-orb.highlighted{box-shadow:0 0 0 1px rgba(255,255,255,0.7),0 0 20px rgba(255,255,255,0.1)}

.roulette-controls{margin-top:24px;display:flex;flex-direction:column;align-items:center;min-height:120px}
.roulette-label{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;font-weight:400;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:20px;letter-spacing:0.02em}
.spin-btn-wrap{transition:opacity 0.4s cubic-bezier(0.16,1,0.3,1),transform 0.4s cubic-bezier(0.16,1,0.3,1)}
.spin-btn-wrap.hidden{opacity:0;transform:translateY(6px);pointer-events:none}
.spin-btn{display:inline-flex;align-items:center;gap:14px;padding:15px 44px;background:#fff;color:#000;border:none;border-radius:100px;font-family:inherit;font-size:13px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s,transform 0.2s}
.spin-btn:hover{opacity:0.9;transform:scale(1.02)}
.spin-btn:active{transform:scale(0.98)}

.spin-result{display:flex;flex-direction:column;align-items:center;text-align:center;opacity:0;transform:translateY(10px);transition:opacity 0.5s cubic-bezier(0.16,1,0.3,1),transform 0.5s cubic-bezier(0.16,1,0.3,1);pointer-events:none;position:absolute}
.spin-result.visible{opacity:1;transform:translateY(0);pointer-events:auto;position:relative}
.spin-result-title{font-size:22px;font-weight:500;letter-spacing:-0.01em}
.spin-result-meta{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px;margin-bottom:20px}
.spin-result-actions{display:flex;gap:10px}
.spin-result-cta{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;background:#fff;color:#000;border:none;border-radius:100px;font-family:inherit;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:opacity 0.2s,transform 0.2s}
.spin-result-cta:hover{opacity:0.9;transform:scale(1.02)}
.spin-result-cta:active{transform:scale(0.98)}
.spin-result-cta svg{width:14px;height:14px}
.spin-again-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:100px;font-family:inherit;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s,transform 0.2s,border-color 0.2s}
.spin-again-btn:hover{border-color:rgba(255,255,255,0.4);transform:scale(1.02)}
.spin-again-btn:active{transform:scale(0.98)}

/* Footer */
.footer-cta{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 32px 60px;min-height:55dvh;opacity:0;transform:translateY(50px);transition:opacity 1.6s cubic-bezier(0.16,1,0.3,1),transform 1.6s cubic-bezier(0.16,1,0.3,1)}
.footer-cta.revealed{opacity:1;transform:translateY(0)}
.footer-headline{font-size:28px;font-weight:500;line-height:1.3;letter-spacing:-0.02em;margin-bottom:36px;max-width:320px}
.footer{border-top:1px solid rgba(255,255,255,0.06);padding:28px 24px calc(28px + var(--sab));display:flex;align-items:flex-start;justify-content:space-between}
.footer-logo{font-size:18px;font-weight:700;letter-spacing:-0.04em}
.footer-links{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.footer-links a{font-family:'NeueHaasText','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s}
.footer-links a:hover{color:#fff}

@media(min-width:768px){
  .hero{height:100dvh}
  .hero-headline{font-size:44px}
  .hero-sub{font-size:16px;max-width:400px}
  .carousel-circle{width:260px;height:260px}
  .carousel-item{width:260px}
  .carousel-track{gap:18px;padding:0 calc(50vw - 130px)}
  .carousel-title{font-size:24px}
  .carousel-meta{font-size:12px}
  .roulette-container{width:480px;height:340px}
  .roulette-section{padding:140px 0 80px}
  .footer-headline{font-size:36px;max-width:440px}
}
</style>
</head>
<body>

<header class="header" id="header">
  <a href="index.html" class="header-logo">OZ</a>
  <div class="search-bar" id="searchTrigger">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
  </div>
  <a href="profile.html" class="profile-btn">E</a>
</header>

<div class="search-overlay" id="searchOverlay">
  <div class="search-overlay-header">
    <input type="text" class="search-input" id="searchInput" placeholder="Search shows, genres..." autocomplete="off">
    <button class="search-close" id="searchClose">Cancel</button>
  </div>
  <div class="search-results" id="searchResults"><p class="search-results-empty" id="searchEmpty">Search OZ</p></div>
</div>

<section class="hero" id="hero">
  <div class="wheel-container" id="wheelContainer">
    <div class="wheel" id="wheel"></div>
  </div>
  <div class="hero-overlay" id="heroOverlay">
    <p class="hero-welcome">Welcome to OZ.</p>
    <h1 class="hero-headline">Stories Live Here.</h1>
    <p class="hero-sub">Original films and episodic worlds from a new generation of filmmakers.</p>
    <a href="watch.html" class="cta-btn">Start Watching <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></a>
  </div>
</section>

<section class="browse-section" id="browse">
  <p class="section-label">Genres:</p>
  <div class="carousel-wrapper"><div class="carousel-track" id="genreCarousel"></div></div>
</section>

<section class="browse-section">
  <p class="section-label">More to explore:</p>
  <div class="carousel-wrapper"><div class="carousel-track" id="showCarousel"></div></div>
</section>

<section class="roulette-section">
  <div class="roulette-container">
    <div class="roulette-galaxy" id="rouletteGalaxy"></div>
  </div>
  <div class="roulette-controls">
    <p class="roulette-label">Not sure what to watch?</p>
    <div class="spin-btn-wrap" id="spinBtnWrap">
      <button class="spin-btn" id="spinBtn">Spin</button>
    </div>
    <div class="spin-result" id="spinResult">
      <div class="spin-result-title" id="spinResultTitle"></div>
      <div class="spin-result-meta" id="spinResultMeta"></div>
      <div class="spin-result-actions">
        <a href="watch.html" class="spin-result-cta" id="spinResultCta">Start Watching <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></a>
        <button class="spin-again-btn" id="spinAgain">Spin Again</button>
      </div>
    </div>
  </div>
</section>

<section class="footer-cta">
  <h2 class="footer-headline">The platform disappears.<br>The story remains.</h2>
  <a href="watch.html" class="cta-btn">Start Watching <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></a>
</section>

<footer class="footer">
  <div class="footer-logo">OZ</div>
  <div class="footer-links"><a href="watch.html">Watch</a><a href="#">Privacy Policy</a></div>
</footer>

<script>
(function(){
  if(sessionStorage.getItem('oz_auth')!=='1'){window.location.href='login.html';return}

  // === VIDEO PATHS (mapped from NEW-CONTENT) ===
  var V='assets/compressed/';
  var WHEEL=[
    V+'COVER1.mp4',V+'COVER2.mp4',V+'COVER3.mp4',V+'COVER4.mp4',
    V+'COVER5-AKIRA.mp4',V+'COVER6-ANIME.mp4',V+'COVER7-ACTION.mp4',V+'COVER8-ROMANCE.mp4',
    V+'COVER9-VINTAGE.mp4',V+'COVER10-ALTERNATIVE.mp4',V+'COVER11-SCIFI.mp4',V+'COVER12-DIEHARD.mp4',
    V+'COVER13-MRMONEY.mp4',V+'COVER14-NOSECONDCHANCES.mp4',V+'COVER15-GHOSTFRAME.mp4',V+'COVER16-TYPECAST.mp4',
    V+'COVER17.mp4',V+'COVER18.mp4'
  ];

  var GENRE_VIDS={
    'Anime':V+'COVER6-ANIME.mp4',
    'Action':V+'COVER7-ACTION.mp4',
    'Vintage':V+'COVER9-VINTAGE.mp4',
    'Experimental':V+'COVER10-ALTERNATIVE.mp4',
    'Romance':V+'COVER8-ROMANCE.mp4',
    'Sci-Fi':V+'COVER11-SCIFI.mp4'
  };

  var SHOW_VIDS={
    'Akira':V+'COVER5-AKIRA.mp4',
    'Die Hard':V+'COVER12-DIEHARD.mp4',
    'Mr Money':V+'COVER13-MRMONEY.mp4',
    'No Second Chances':V+'COVER14-NOSECONDCHANCES.mp4',
    'Ghost Frame':V+'COVER15-GHOSTFRAME.mp4',
    'Type Cast':V+'COVER16-TYPECAST.mp4'
  };

  function makeVideo(src){
    var v=document.createElement('video');
    v.src=src;v.muted=true;v.loop=true;v.playsInline=true;v.autoplay=true;
    v.setAttribute('playsinline','');v.setAttribute('webkit-playsinline','');v.setAttribute('muted','');
    v.preload='metadata';
    v.addEventListener('canplay',function(){v.play().catch(function(){})},{once:true});
    return v;
  }

  // Force-play on first interaction (mobile)
  function forcePlay(){
    document.querySelectorAll('video').forEach(function(v){v.play().catch(function(){})});
    document.removeEventListener('touchstart',forcePlay);
    document.removeEventListener('click',forcePlay);
  }
  document.addEventListener('touchstart',forcePlay,{once:true,passive:true});
  document.addEventListener('click',forcePlay,{once:true});

  // === ENTRANCE SEQUENCE ===
  var body=document.body;
  var header=document.getElementById('header');
  var wheelContainer=document.getElementById('wheelContainer');
  var heroOverlay=document.getElementById('heroOverlay');
  var isDesktop=window.innerWidth>=768;

  function entrance(){
    body.style.transition='opacity 1.4s ease';
    body.style.opacity='1';

    setTimeout(function(){
      header.style.transition='opacity 1s cubic-bezier(0.16,1,0.3,1), transform 1s cubic-bezier(0.16,1,0.3,1)';
      header.style.opacity='1';header.style.transform='translateY(0)';
    },400);

    setTimeout(function(){
      wheelContainer.style.transition='opacity 2s cubic-bezier(0.16,1,0.3,1)';
      wheelContainer.style.opacity='1';
    },600);

    setTimeout(function(){
      heroOverlay.classList.add('entered');
    },900);
  }
  requestAnimationFrame(function(){requestAnimationFrame(entrance)});

  // === HERO WHEEL ===
  var wheel=document.getElementById('wheel');
  var ORB_COUNT=18,ORB_SIZE=46,CX=185,CY=185,RADIUS=162;
  var orbEls=[];

  for(var i=0;i<ORB_COUNT;i++){
    var el=document.createElement('div');
    el.className='wheel-item';
    el.style.cssText='width:'+ORB_SIZE+'px;height:'+ORB_SIZE+'px';
    el.appendChild(makeVideo(WHEEL[i]));
    wheel.appendChild(el);
    orbEls.push(el);
  }

  var wAngle=0,wAuto=0.001,wDrag=false,wLastX=0,wVel=0,wLastT=0;
  var wSmooth=0;

  function layoutWheel(){
    for(var i=0;i<ORB_COUNT;i++){
      var a=wSmooth+(i/ORB_COUNT)*6.2832;
      var x=CX+Math.cos(a)*RADIUS-(ORB_SIZE>>1);
      var y=CY+Math.sin(a)*RADIUS-(ORB_SIZE>>1);
      orbEls[i].style.transform='translate3d('+x+'px,'+y+'px,0)';
    }
  }

  var wVisible=true,wRafId=0;
  function animWheel(){
    if(!wVisible){wRafId=0;return}
    if(!wDrag){wAngle+=wAuto+wVel;wVel*=0.97;if(Math.abs(wVel)<0.00002)wVel=0}
    wSmooth+=(wAngle-wSmooth)*0.08;
    layoutWheel();
    wRafId=requestAnimationFrame(animWheel);
  }

  wheel.addEventListener('pointerdown',function(e){wDrag=true;wLastX=e.clientX;wVel=0;wLastT=performance.now();wheel.setPointerCapture(e.pointerId)});
  wheel.addEventListener('pointermove',function(e){if(!wDrag)return;var dx=e.clientX-wLastX;var now=performance.now();var dt=now-wLastT||1;wAngle+=dx*0.005;wVel=(dx*0.003)/(dt/16);wLastX=e.clientX;wLastT=now});
  wheel.addEventListener('pointerup',function(){wDrag=false});
  wheel.addEventListener('pointercancel',function(){wDrag=false});

  var heroEl=document.getElementById('hero');
  new IntersectionObserver(function(entries){
    wVisible=entries[0].isIntersecting;
    if(wVisible&&!wRafId)wRafId=requestAnimationFrame(animWheel);
  },{threshold:0}).observe(heroEl);
  animWheel();

  // === SCROLL REVEAL (re-triggers) ===
  var revealEls=document.querySelectorAll('.browse-section,.roulette-section,.footer-cta');
  var revealObs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting)e.target.classList.add('revealed');
      else e.target.classList.remove('revealed');
    });
  },{threshold:0.05,rootMargin:'0px 0px -40px 0px'});
  revealEls.forEach(function(el){revealObs.observe(el)});

  // === DATA ===
  var genres=[
    {name:'Anime',count:'145 Series',type:'genre',vid:GENRE_VIDS['Anime']},
    {name:'Action',count:'120 Series',type:'genre',vid:GENRE_VIDS['Action']},
    {name:'Vintage',count:'42 Series',type:'genre',vid:GENRE_VIDS['Vintage']},
    {name:'Experimental',count:'31 Series',type:'genre',vid:GENRE_VIDS['Experimental']},
    {name:'Romance',count:'63 Series',type:'genre',vid:GENRE_VIDS['Romance']},
    {name:'Sci-Fi',count:'54 Series',type:'genre',vid:GENRE_VIDS['Sci-Fi']}
  ];

  var shows=[
    {name:'Akira',count:'4 Episodes',type:'show',vid:SHOW_VIDS['Akira']},
    {name:'Die Hard',count:'9 Episodes',type:'show',vid:SHOW_VIDS['Die Hard']},
    {name:'Mr Money',count:'44 Episodes',type:'show',vid:SHOW_VIDS['Mr Money']},
    {name:'No Second Chances',count:'12 Episodes',type:'show',vid:SHOW_VIDS['No Second Chances']},
    {name:'Ghost Frame',count:'68 Episodes',type:'show',vid:SHOW_VIDS['Ghost Frame']},
    {name:'Type Cast',count:'1 Episode',type:'show',vid:SHOW_VIDS['Type Cast']}
  ];

  var allItems=genres.concat(shows);

  // === CAROUSELS ===
  function buildCarousel(id,data){
    var track=document.getElementById(id);
    for(var s=0;s<3;s++){
      data.forEach(function(item){
        var el=document.createElement('a');
        el.className='carousel-item';
        el.href='watch.html?q='+encodeURIComponent(item.name);
        var circle=document.createElement('div');
        circle.className='carousel-circle';
        circle.appendChild(makeVideo(item.vid));
        var ov=document.createElement('div');
        ov.className='circle-overlay';
        ov.innerHTML='<span class="carousel-title">'+item.name+'</span><span class="carousel-meta">'+item.count+'</span>';
        circle.appendChild(ov);
        el.appendChild(circle);
        track.appendChild(el);
      });
    }

    var itemW=isDesktop?278:204;
    var oneSetW=data.length*itemW;
    track.scrollLeft=oneSetW;

    var ticking=false;
    track.addEventListener('scroll',function(){
      if(!ticking){requestAnimationFrame(function(){
        var sl=track.scrollLeft;
        if(sl<oneSetW*0.5)track.scrollLeft+=oneSetW;
        else if(sl>oneSetW*1.5)track.scrollLeft-=oneSetW;
        applySpatial(track);
        ticking=false;
      });ticking=true}
    },{passive:true});
    applySpatial(track);
  }

  function applySpatial(track){
    var rect=track.getBoundingClientRect();
    var center=rect.left+rect.width/2;
    var items=track.children;
    for(var i=0;i<items.length;i++){
      var ir=items[i].getBoundingClientRect();
      var dist=Math.abs(center-ir.left-ir.width/2);
      var ratio=Math.min(dist/(rect.width*0.5),1);
      var s=1-ratio*0.22;
      items[i].style.transform='scale('+s+')';
      items[i].style.opacity=(1-ratio*0.5).toFixed(2);
      items[i].style.filter='brightness('+(1-ratio*0.3).toFixed(2)+')';
    }
  }

  buildCarousel('genreCarousel',genres);
  buildCarousel('showCarousel',shows);

  // === ROULETTE (10 random, touch-draggable) ===
  var rGalaxy=document.getElementById('rouletteGalaxy');
  var rouletteItems=WHEEL.slice().sort(function(){return Math.random()-0.5}).slice(0,10);
  var rouletteShows=allItems.slice().sort(function(){return Math.random()-0.5}).slice(0,10);

  var rCount=10,rCX=isDesktop?240:170,rCY=isDesktop?170:130,rRX=isDesktop?200:145,rRY=isDesktop?115:85,rOrbSize=isDesktop?72:58;
  var rOrbs=[];

  for(var i=0;i<rCount;i++){
    var el=document.createElement('div');
    el.className='roulette-orb';
    el.style.cssText='width:'+rOrbSize+'px;height:'+rOrbSize+'px';
    el.appendChild(makeVideo(rouletteItems[i]));
    rGalaxy.appendChild(el);
    rOrbs.push(el);
  }

  var rAngle=0,rAuto=0.002,rSpinVel=0,rSpinning=false;
  var rDrag=false,rLastX=0,rDragVel=0,rLastT=0;
  var rSmooth=0;

  function getClosest(){
    var c=0,m=Infinity;
    for(var i=0;i<rCount;i++){
      var a=rAngle+(i/rCount)*6.2832;
      var n=((a%6.2832)+6.2832)%6.2832;
      var d=Math.min(Math.abs(n-1.5708),6.2832-Math.abs(n-1.5708));
      if(d<m){m=d;c=i}
    }
    return c;
  }

  var rStopped=false,rSelectedIdx=-1;

  function layoutRoulette(){
    for(var i=0;i<rCount;i++){
      var a=rSmooth+(i/rCount)*6.2832;
      var x=rCX+Math.cos(a)*rRX-(rOrbSize>>1);
      var y=rCY+Math.sin(a)*rRY-(rOrbSize>>1);
      var depth=(Math.sin(a)+1)/2;

      if(rStopped&&rSelectedIdx>=0){
        if(i===rSelectedIdx){
          var hs=1.25;
          rOrbs[i].style.transform='translate3d('+x+'px,'+y+'px,0) scale('+hs+')';
          rOrbs[i].style.zIndex='100';
          rOrbs[i].style.opacity='1';
          rOrbs[i].style.filter='brightness(1.1)';
          rOrbs[i].classList.add('highlighted');
        }else{
          var s=0.6+depth*0.4;
          rOrbs[i].style.transform='translate3d('+x+'px,'+y+'px,0) scale('+s+')';
          rOrbs[i].style.zIndex=Math.floor(depth*10);
          rOrbs[i].style.opacity='0.15';
          rOrbs[i].style.filter='brightness(0.4)';
          rOrbs[i].classList.remove('highlighted');
        }
      }else{
        var s=0.6+depth*0.4;
        rOrbs[i].style.transform='translate3d('+x+'px,'+y+'px,0) scale('+s+')';
        rOrbs[i].style.zIndex=Math.floor(depth*10);
        rOrbs[i].style.opacity=(0.35+depth*0.65).toFixed(2);
        rOrbs[i].style.filter='';
        rOrbs[i].classList.remove('highlighted');
      }
    }
  }

  var rSnapTarget=null;
  var rVisible=false,rRafId=0;

  function animRoulette(){
    if(!rVisible&&!rSpinning&&rSnapTarget===null){rRafId=0;return}
    if(rSpinning){
      rAngle+=rSpinVel;
      rSpinVel*=0.992;
      if(Math.abs(rSpinVel)<0.001){
        rSpinning=false;rSpinVel=0;
        var c=getClosest();
        rSelectedIdx=c;
        rSnapTarget=1.5708-(c/rCount)*6.2832;
        while(rSnapTarget<rAngle-Math.PI)rSnapTarget+=6.2832;
        while(rSnapTarget>rAngle+Math.PI)rSnapTarget-=6.2832;
      }
    }else if(rSnapTarget!==null){
      var d=rSnapTarget-rAngle;
      if(Math.abs(d)<0.0005){
        rAngle=rSnapTarget;
        rSnapTarget=null;
        rStopped=true;
        showResult();
      }else{
        rAngle+=d*0.1;
      }
    }else if(rDrag){
    }else if(!rStopped){
      rAngle+=rAuto+rDragVel;
      rDragVel*=0.97;
      if(Math.abs(rDragVel)<0.00002)rDragVel=0;
    }
    rSmooth+=(rAngle-rSmooth)*0.1;
    layoutRoulette();
    rRafId=requestAnimationFrame(animRoulette);
  }

  // Touch/drag on roulette
  rGalaxy.addEventListener('pointerdown',function(e){
    if(rSpinning||rStopped)return;
    rDrag=true;rLastX=e.clientX;rDragVel=0;rLastT=performance.now();
    rGalaxy.setPointerCapture(e.pointerId);
  });
  rGalaxy.addEventListener('pointermove',function(e){
    if(!rDrag)return;
    var dx=e.clientX-rLastX;
    var now=performance.now();
    var dt=now-rLastT||1;
    rAngle-=dx*0.005;
    rDragVel=-(dx*0.003)/(dt/16);
    rLastX=e.clientX;rLastT=now;
  });
  rGalaxy.addEventListener('pointerup',function(){rDrag=false});
  rGalaxy.addEventListener('pointercancel',function(){rDrag=false});

  var spinBtnWrap=document.getElementById('spinBtnWrap');
  var spinResult=document.getElementById('spinResult');

  function showResult(){
    var c=rSelectedIdx;
    layoutRoulette();
    var item=rouletteShows[c]||allItems[c%allItems.length];
    document.getElementById('spinResultTitle').textContent=item.name;
    document.getElementById('spinResultMeta').textContent=item.count;
    document.getElementById('spinResultCta').href='watch.html?q='+encodeURIComponent(item.name);
    spinResult.classList.add('visible');
  }

  function doSpin(){
    if(rSpinning)return;
    rStopped=false;
    rSelectedIdx=-1;
    rSpinning=true;
    rSpinVel=0.15+Math.random()*0.1;
    spinBtnWrap.classList.add('hidden');
    spinResult.classList.remove('visible');
  }

  document.getElementById('spinBtn').addEventListener('click',doSpin);
  document.getElementById('spinAgain').addEventListener('click',function(){
    spinResult.classList.remove('visible');
    setTimeout(doSpin,200);
  });

  var rouletteSec=document.querySelector('.roulette-section');
  new IntersectionObserver(function(entries){
    rVisible=entries[0].isIntersecting;
    if(rVisible&&!rRafId)rRafId=requestAnimationFrame(animRoulette);
  },{threshold:0}).observe(rouletteSec);
  animRoulette();

  // === VIDEO VISIBILITY (pause off-screen videos) ===
  var vidObs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      var v=e.target;
      if(e.isIntersecting){v.play().catch(function(){})}
      else{v.pause()}
    });
  },{threshold:0,rootMargin:'200px 0px'});
  setTimeout(function(){
    document.querySelectorAll('video').forEach(function(v){vidObs.observe(v)});
  },2000);

  // === SEARCH (debounced) ===
  var searchOverlay=document.getElementById('searchOverlay');
  var searchInput=document.getElementById('searchInput');
  var searchResults=document.getElementById('searchResults');
  var searchEmpty=document.getElementById('searchEmpty');
  var searchTimer;

  document.getElementById('searchTrigger').addEventListener('click',function(){
    searchOverlay.classList.add('active');
    setTimeout(function(){searchInput.focus()},50);
  });

  document.getElementById('searchClose').addEventListener('click',function(){
    searchOverlay.classList.remove('active');
    searchInput.value='';
    searchResults.innerHTML='';
    searchResults.appendChild(searchEmpty);
    searchEmpty.textContent='Search OZ';
  });

  searchInput.addEventListener('input',function(){
    clearTimeout(searchTimer);
    searchTimer=setTimeout(doSearch,150);
  });

  function doSearch(){
    var q=searchInput.value.toLowerCase().trim();
    searchResults.innerHTML='';
    if(!q){searchResults.appendChild(searchEmpty);searchEmpty.textContent='Search OZ';return}
    var matches=allItems.filter(function(item){return item.name.toLowerCase().indexOf(q)>-1||item.type.indexOf(q)>-1});
    if(!matches.length){searchResults.appendChild(searchEmpty);searchEmpty.textContent='No results found';return}
    var frag=document.createDocumentFragment();
    matches.forEach(function(item){
      var a=document.createElement('a');
      a.className='search-result-item';
      a.href='watch.html?q='+encodeURIComponent(item.name);
      var thumb=document.createElement('div');
      thumb.className='search-result-thumb';
      thumb.appendChild(makeVideo(item.vid));
      var info=document.createElement('div');
      info.className='search-result-info';
      info.innerHTML='<span class="search-result-name">'+item.name+'</span><span class="search-result-type">'+item.type+' · '+item.count+'</span>';
      a.appendChild(thumb);a.appendChild(info);
      frag.appendChild(a);
    });
    searchResults.appendChild(frag);
  }

})();
</script>
</body>
</html>
