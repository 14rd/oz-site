<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OZ</title>
<style>
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro'), local('NeueHaasDisplay-Roman'), local('Helvetica Neue');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro Medium'), local('NeueHaasDisplay-Medium'), local('Helvetica Neue Medium');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro Bold'), local('NeueHaasDisplay-Bold'), local('Helvetica Neue Bold');
  font-weight: 700;
  font-style: normal;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'NeueHaasDisplay', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #000;
  color: #fff;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.login-container {
  width: 100%;
  max-width: 380px;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.08em;
  margin-bottom: 48px;
}

.form-group {
  width: 100%;
  margin-bottom: 16px;
}

.form-group input {
  width: 100%;
  padding: 14px 18px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 100px;
  color: #fff;
  font-family: inherit;
  font-size: 15px;
  letter-spacing: 0.01em;
  outline: none;
  transition: border-color 0.2s ease;
}

.form-group input::placeholder {
  color: rgba(255,255,255,0.35);
}

.form-group input:focus {
  border-color: rgba(255,255,255,0.5);
}

.error-msg {
  color: #ff4444;
  font-size: 13px;
  text-align: center;
  margin-bottom: 16px;
  min-height: 18px;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.error-msg.visible {
  opacity: 1;
}

.login-btn {
  width: 100%;
  padding: 16px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 100px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: opacity 0.2s ease;
}

.login-btn:hover {
  opacity: 0.9;
}

.login-btn:active {
  opacity: 0.8;
}

.login-btn svg {
  width: 18px;
  height: 18px;
}
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">OZ</div>
  <form id="loginForm" autocomplete="off">
    <div class="form-group">
      <input type="text" id="username" placeholder="Username" autocomplete="off" required>
    </div>
    <div class="form-group">
      <input type="password" id="password" placeholder="Password" autocomplete="off" required>
    </div>
    <div class="error-msg" id="errorMsg">Invalid credentials.</div>
    <button type="submit" class="login-btn">
      Sign In
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>
  </form>
</div>
<script>
(function() {
  if (sessionStorage.getItem('oz_auth') === '1') {
    window.location.href = 'index.html';
    return;
  }

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;

    if (u === 'BlankSquare' && p === 'Akira85*') {
      sessionStorage.setItem('oz_auth', '1');
      window.location.href = 'index.html';
    } else {
      errorMsg.classList.add('visible');
      setTimeout(() => errorMsg.classList.remove('visible'), 2000);
    }
  });
})();
</script>
</body>
</html>
