<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OZ — Profile</title>
<style>
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro'), local('NeueHaasDisplay-Roman'), local('Helvetica Neue');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro Medium'), local('NeueHaasDisplay-Medium'), local('Helvetica Neue Medium');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasDisplay';
  src: local('Neue Haas Grotesk Display Pro Bold'), local('NeueHaasDisplay-Bold'), local('Helvetica Neue Bold');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'NeueHaasText';
  src: local('Neue Haas Grotesk Text Pro'), local('NeueHaasText-Roman'), local('Helvetica Neue');
  font-weight: 400;
  font-style: normal;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

body {
  font-family: 'NeueHaasDisplay', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #000;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  min-height: 100dvh;
}

.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  padding: calc(14px + var(--sat)) 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  pointer-events: none;
}

.header > * { pointer-events: auto; }

.header-logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.04em;
  flex-shrink: 0;
  cursor: pointer;
  text-decoration: none;
  color: #fff;
}

.back-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  background: rgba(0,0,0,0.25);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  backdrop-filter: blur(24px) saturate(1.3);
  transition: border-color 0.3s;
  text-decoration: none;
}

.back-btn:hover { border-color: rgba(255,255,255,0.35); }
.back-btn svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.6); }

.profile-page {
  padding: calc(80px + var(--sat)) 24px calc(40px + var(--sab));
  display: flex;
  flex-direction: column;
  align-items: center;
}

.profile-avatar {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 500;
  margin-bottom: 16px;
  background: rgba(255,255,255,0.04);
  opacity: 0;
  transform: scale(0.9);
  animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
}

.profile-name {
  font-size: 24px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
  opacity: 0;
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
}

.profile-handle {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.02em;
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
}

.profile-stats {
  display: flex;
  gap: 40px;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
}

.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.stat-num {
  font-size: 22px;
  font-weight: 500;
}

.stat-label {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.profile-section {
  width: 100%;
  max-width: 400px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
}

.profile-section + .profile-section {
  margin-top: 36px;
  animation-delay: 0.7s;
}

.profile-section-title {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.profile-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
  transition: opacity 0.2s;
}

.profile-list-item:hover { opacity: 0.7; }

.profile-list-item-label {
  font-size: 15px;
  font-weight: 400;
}

.profile-list-item-value {
  font-family: 'NeueHaasText', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  display: flex;
  align-items: center;
  gap: 6px;
}

.profile-list-item-value svg {
  width: 14px;
  height: 14px;
  stroke: rgba(255,255,255,0.25);
}

.sign-out-btn {
  width: 100%;
  max-width: 400px;
  margin-top: 48px;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  color: rgba(255,255,255,0.5);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  opacity: 0;
  animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
}

.sign-out-btn:hover {
  border-color: rgba(255,255,255,0.3);
  color: #fff;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header-logo">OZ</a>
  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </a>
</header>

<div class="profile-page">
  <div class="profile-avatar">E</div>
  <h1 class="profile-name">Explorer</h1>
  <p class="profile-handle">@blanksquare</p>

  <div class="profile-stats">
    <div class="stat">
      <span class="stat-num">12</span>
      <span class="stat-label">Watched</span>
    </div>
    <div class="stat">
      <span class="stat-num">4</span>
      <span class="stat-label">Saved</span>
    </div>
    <div class="stat">
      <span class="stat-num">7h</span>
      <span class="stat-label">Time</span>
    </div>
  </div>

  <div class="profile-section">
    <h3 class="profile-section-title">Account</h3>
    <div class="profile-list-item">
      <span class="profile-list-item-label">Username</span>
      <span class="profile-list-item-value">
        BlankSquare
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </span>
    </div>
    <div class="profile-list-item">
      <span class="profile-list-item-label">Subscription</span>
      <span class="profile-list-item-value">
        Early Access
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </span>
    </div>
  </div>

  <div class="profile-section">
    <h3 class="profile-section-title">Preferences</h3>
    <div class="profile-list-item">
      <span class="profile-list-item-label">Quality</span>
      <span class="profile-list-item-value">
        Auto
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </span>
    </div>
    <div class="profile-list-item">
      <span class="profile-list-item-label">Notifications</span>
      <span class="profile-list-item-value">
        On
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </span>
    </div>
    <div class="profile-list-item">
      <span class="profile-list-item-label">Autoplay</span>
      <span class="profile-list-item-value">
        On
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </span>
    </div>
  </div>

  <button class="sign-out-btn" id="signOut">Sign Out</button>
</div>

<script>
(function() {
  if (sessionStorage.getItem('oz_auth') !== '1') {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('signOut').addEventListener('click', () => {
    sessionStorage.removeItem('oz_auth');
    window.location.href = 'login.html';
  });
})();
</script>
</body>
</html>
